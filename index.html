  :root {

    --parch-dark: #e8d9b8;

    --curative: #3a6b35;
    --curative-light: #5a9154;
    --curative-bg: #e8f2e7;
    --nocif: #8b1a1a;
    --nocif-light: #c0392b;
    --nocif-bg: #f5e8e8;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --border: #a08040;
    --shadow: rgba(43,31,14,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1a1208;
    background-image:

    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    position: relative;
  }
  .header-inner {
    display: inline-block;
    background: var(--parch);
    border: 3px double var(--border);
    padding: 2rem 3rem;
    position: relative;
    box-shadow: 0 8px 32px var(--shadow), inset 0 0 60px rgba(184,134,11,0.08);
  }
  .header-inner::before, .header-inner::after {
    content: '❧';
    position: absolute;
    font-size: 1.5rem;
    color: var(--gold);
  }
  .header-inner::before { top: 0.5rem; left: 1rem; }
  .header-inner::after { bottom: 0.5rem; right: 1rem; transform: scaleX(-1); }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .header-sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-light);
    font-size: 1.1rem;
    margin-top: 0.5rem;
  }
  .ornament {
    color: var(--gold);
    font-size: 1.2rem;
    margin: 0.4rem 0;
    letter-spacing: 0.5em;
  }

  /* SEARCH & FILTERS */
  .controls {
    max-width: 900px;
    margin: 0 auto 2.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    justify-content: center;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 280px;
    max-width: 420px;
  }
  .search-wrap::before {
    content: '⚗';
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1rem;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 0.6rem 1rem 0.6rem 2.2rem;
    background: var(--parch);
    border: 2px solid var(--border);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--gold); }
  input[type="search"]::placeholder { color: #9a7a50; font-style: italic; }

  .filter-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .filter-btn {
    padding: 0.4rem 1.1rem;
    border: 2px solid;
    background: transparent;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .filter-btn.all { border-color: var(--border); color: var(--ink-light); background: var(--parch); }
  .filter-btn.curative { border-color: var(--curative); color: var(--curative); background: rgba(232,242,231,0.7); }
  .filter-btn.nocif { border-color: var(--nocif); color: var(--nocif); background: rgba(245,232,232,0.7); }
  .filter-btn.active, .filter-btn:hover { color: white !important; }
  .filter-btn.all.active, .filter-btn.all:hover { background: var(--ink-light) !important; border-color: var(--ink-light); }
  .filter-btn.curative.active, .filter-btn.curative:hover { background: var(--curative) !important; }
  .filter-btn.nocif.active, .filter-btn.nocif:hover { background: var(--nocif) !important; }

  /* ZONE SECTIONS */
  .zone-section {
    max-width: 960px;
    margin: 0 auto 2.5rem;
  }
  .zone-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--parch);
    text-align: center;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    letter-spacing: 0.08em;
  }
  .zone-title::before, .zone-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .zone-title.reversed::before, .zone-title.reversed::after {
    background: linear-gradient(to right, transparent, var(--nocif-light), transparent);
  }

  .sublocation-label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--gold-light);
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
    opacity: 0.85;
  }

  .plants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  /* PLANT CARD */
  .plant-card {
    background: var(--parch);
    border: 1px solid var(--border);
    padding: 1.1rem 1.2rem;
    position: relative;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 2px 3px 10px var(--shadow);
    animation: fadeIn 0.4s ease both;
  }
  .plant-card:hover {
    transform: translateY(-3px);
    box-shadow: 4px 8px 20px var(--shadow);
  }
  .plant-card::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid rgba(184,134,11,0.3);
    pointer-events: none;
  }

  .plant-card.curative { border-left: 4px solid var(--curative); }
  .plant-card.nocif { border-left: 4px solid var(--nocif); }

  .plant-card-type {
    position: absolute;
    top: 0.5rem;
    right: 0.7rem;
    font-size: 0.7rem;
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.05em;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
  }
  .curative .plant-card-type { color: var(--curative); background: var(--curative-bg); }
  .nocif .plant-card-type { color: var(--nocif); background: var(--nocif-bg); }

  .plant-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.95rem;
    margin-bottom: 0.6rem;
    padding-right: 4rem;
    line-height: 1.4;
    color: var(--ink);
  }
  .curative .plant-name { color: #2a4f26; }
  .nocif .plant-name { color: #6b1414; }

  .location-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-light);
    margin-bottom: 0.6rem;
    opacity: 0.8;
  }
  .location-tag::before { content: '📍 '; font-style: normal; }

  .effects-list {
    list-style: none;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .effects-list li {
    padding-left: 1.1rem;
    position: relative;
    color: #3a2e1a;
  }
  .effects-list li::before {
    position: absolute;
    left: 0;
    font-size: 0.65rem;
    top: 0.22rem;
  }
  .curative .effects-list li { color: #2d4a28; }
  .curative .effects-list li::before { content: '✦'; color: var(--curative); }
  .nocif .effects-list li { color: #5c1a1a; }
  .nocif .effects-list li::before { content: '☠'; color: var(--nocif); }

  .warning-list {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px dashed var(--border);
  }
  .warning-list li { color: #8b4513 !important; font-style: italic; }
  .warning-list li::before { content: '⚠' !important; color: #c87941 !important; }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    color: var(--parch);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.2rem;
    padding: 3rem;
    display: none;
  }

  /* FOOTER */
  footer {
    text-align: center;
    color: rgba(245,237,216,0.4);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    margin-top: 3rem;
    letter-spacing: 0.05em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }

  /* STATS BAR */
  .stats-bar {
    max-width: 960px;
    margin: 0 auto 1.5rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--parch);
    border: 1px solid var(--border);
    padding: 0.3rem 0.9rem;
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    color: var(--ink-light);
  }
  .stat-pill span { font-weight: 600; }
  .stat-pill.c span { color: var(--curative); }
  .stat-pill.n span { color: var(--nocif); }
</style>
</head>

// BUILD UI
// ══════════════════

const ZONE_ORDER = [
  "Zone Forêt",
  "Zone Capital",
  "Zone QDP",
  "Zone Sélection Finale",
  "Zone Magma"
];

const ZONE_ICONS = {
  "Zone Forêt": "🌲",
  "Zone Capital": "🏰",
  "Zone QDP": "⚔️",
  "Zone Sélection Finale": "✨",
  "Zone Magma": "🌋"
};

let activeFilter = 'all';
let searchQuery = '';

function renderPlants() {
  const container = document.getElementById('plantContainer');
  container.innerHTML = '';

  const filtered = plants.filter(p => {
    const matchType = activeFilter === 'all' || p.type === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      p.zone.toLowerCase().includes(q) ||
      p.location.toLowerCase().includes(q) ||
      p.effects.some(e => e.toLowerCase().includes(q)) ||
      p.warnings.some(w => w.toLowerCase().includes(q));
    return matchType && matchSearch;
  });

  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';

  // Count
  document.getElementById('countCurative').textContent = plants.filter(p => p.type === 'curative').length;
  document.getElementById('countNocif').textContent = plants.filter(p => p.type === 'nocif').length;
  document.getElementById('countTotal').textContent = plants.length;

  // Group by zone then location
  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.zone]) grouped[p.zone] = {};
    if (!grouped[p.zone][p.location]) grouped[p.zone][p.location] = [];
    grouped[p.zone][p.location].push(p);
  });

  ZONE_ORDER.forEach(zone => {
    if (!grouped[zone]) return;

    const zoneEl = document.createElement('div');
    zoneEl.className = 'zone-section';

    const hasNocif = Object.values(grouped[zone]).flat().some(p => p.type === 'nocif');
    const titleEl = document.createElement('div');
    titleEl.className = `zone-title${hasNocif && activeFilter === 'nocif' ? ' reversed' : ''}`;
    titleEl.innerHTML = `${ZONE_ICONS[zone] || '🌿'} ${zone}`;
    zoneEl.appendChild(titleEl);

    Object.entries(grouped[zone]).forEach(([loc, locPlants]) => {
      if (loc !== zone) {
        const locLabel = document.createElement('div');
        locLabel.className = 'sublocation-label';
        locLabel.textContent = `— ${loc} —`;
        zoneEl.appendChild(locLabel);
      }

      const grid = document.createElement('div');
      grid.className = 'plants-grid';

      locPlants.forEach(p => {
        const card = document.createElement('div');
        card.className = `plant-card ${p.type}`;

        const typeLabel = p.type === 'curative' ? '✦ Curative' : '☠ Nocive';
        card.innerHTML = `
          <div class="plant-card-type">${typeLabel}</div>
          <div class="plant-name">${p.name}</div>
          <div class="location-tag">${p.zone} · ${p.location}</div>
          <ul class="effects-list">
            ${p.effects.map(e => `<li>${e}</li>`).join('')}
            ${p.warnings.length ? `<ul class="effects-list warning-list">${p.warnings.map(w => `<li>${w}</li>`).join('')}</ul>` : ''}
          </ul>
        `;
        grid.appendChild(card);
      });

      zoneEl.appendChild(grid);
    });

    container.appendChild(zoneEl);
  });
}

// Events
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderPlants();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderPlants();
});

renderPlants();
</script>
